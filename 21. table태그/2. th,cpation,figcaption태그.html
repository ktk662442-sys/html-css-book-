<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>th,caption,figcaption 태그</title>
    <style>
        figcaption{border: 1px solid #333;}
        th, td{border: 2px solid #333;}
    </style>
</head>
<body>

    <!-- 
        th,caption,figcaption태그

        1. th태그 : 표의 제목 셀을 만들 때 사용하는 태그
        2. caption : 표에 제목을 붙일 때 사용하는 태그
        3. figcaption : figure태그와 함께 사용되며, 이미지나 도표에 설명을 붙일 때 사용하는 태그
    -->

    <figcaption>이미지에 대한 설명</figcaption> <!-- 이미지 설명 -->

    <table> <!-- 표의 시작 -->

        <caption>표의 제목</caption> <!-- 표의 제목 -->

        <tr> <!-- 행의 시작 -->

            <th>제목1</th> <!-- 제목 셀 -->
            <th>제목1</th>

        </tr>

         <tr> <!-- 행의 시작 -->

            <td>내용1</td> <!-- 열의 시작 -->
            <td>내용1</td>

        </tr>

         <tr> <!-- 행의 시작 -->

            <td>내용1</td> <!-- 열의 시작 -->
            <td>내용1</td>

        </tr>

    </table>
    
</body>
</html>
