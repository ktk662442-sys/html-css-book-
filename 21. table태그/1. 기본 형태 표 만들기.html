<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기본 형태 표 만들기</title>
    <style>
        td{border: 2px solid #333;}
    </style>
</head>
<body>

    <!-- 
        기본 형태 표 만들기
        1. 표(table)태그 : <table> </table> = 표의 시작과 끝을 나타내는 태그
        2. 행(tr) 태그 : <tr> </tr> = 표의 행을 나타내는 태그 / row
        3. 열(td) 태그 : <td> </td> = 표의 열을 나타내는 태그 / column
    -->

    <!-- 표의 시작 -->
    <table>
        <!-- 행의 시작 -->
            <tr>
                <td>1행 1열</td>
                <td>1행 2열</td>
                <td>1행 3열</td>
            </tr>
        <!-- 행의 끝 -->

            <tr>
                <td>2행 1열</td>
                <td>2행 2열</td>
                <td>2행 3열</td>
            </tr>
    </table>
    <!-- 표의 끝 -->
    
</body>
</html>
